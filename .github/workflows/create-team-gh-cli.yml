name: Team Auto Management

on:
  workflow_dispatch: {}

jobs:
  manage-team:
    runs-on: ubuntu-latest

    env:
      ORG: citrincooperman1
      TEAM_NAME: "reviewers-team"
      TEAM_MEMBERS: "civerson-citrincooperman"
      GH_TOKEN: ${{ secrets.GH_TOKEN }}

    steps:


      # ✅ Initialize variables
      - name: Initialize variables
        run: |
          TEAM_SLUG=$(echo "$TEAM_NAME" | tr '[:upper:]' '[:lower:]' | tr ' ' '-')
          echo "TEAM_SLUG=$TEAM_SLUG" >> $GITHUB_ENV

      # ✅ Create team if missing
      - name: Create team if missing
        run: |
          if gh api orgs/$ORG/teams/$TEAM_SLUG > /dev/null 2>&1; then
            echo "✅ Team already exists"
          else
            echo "🚀 Creating team..."
            gh api -X POST orgs/$ORG/teams \
              -f name="$TEAM_NAME" \
              -f permission="pull"
          fi

      # ✅ Add members to team
      - name: Add members to team
        run: |
          IFS=',' read -ra USERS <<< "$TEAM_MEMBERS"

          for user in "${USERS[@]}"; do
            user=$(echo "$user" | xargs)
            if [ -z "$user" ]; then
              continue
            fi

            echo "Adding $user to team..."
            gh api -X PUT \
              orgs/$ORG/teams/$TEAM_SLUG/memberships/$user \
              -f role="member"
          done

      # ✅ Assign access to repo (manual trigger case)
      - name: Assign access to repo
        run: |
          if [ -z "${{ github.event.repository.name }}" ]; then
            echo "⚠️ No repo found in event, skipping..."
            exit 0
          fi

          REPO_NAME="${{ github.event.repository.name }}"

          echo "🆕 Repo detected: $REPO_NAME"

          gh api -X PUT \
            orgs/$ORG/teams/$TEAM_SLUG/repos/$ORG/$REPO_NAME \
            -f permission="pull"